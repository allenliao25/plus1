name: Plus1
options:
  bundleIdPrefix: com.allenliao
  deploymentTarget:
    iOS: "17.0"
packages:
  Supabase:
    url: https://github.com/supabase/supabase-swift
    from: 2.5.0
  PostHog:
    url: https://github.com/PostHog/posthog-ios
    from: 3.0.0
  Sentry:
    url: https://github.com/getsentry/sentry-cocoa
    from: 8.0.0
schemes:
  Plus1:
    build:
      targets:
        Plus1: all
    run:
      config: Debug
    test:
      targets:
        - Plus1UITests
targets:
  Plus1:
    type: application
    platform: iOS
    sources: [Plus1]
    dependencies:
      - package: Supabase
        product: Supabase
      - package: PostHog
        product: PostHog
      - package: Sentry
        product: Sentry
    configFiles:
      Debug: Config/Analytics.xcconfig
      Release: Config/Analytics.xcconfig
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.allenliao.Plus1
        CODE_SIGN_ENTITLEMENTS: Plus1/Plus1.entitlements
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: PNQXU683AK
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: 1
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: plus1
        INFOPLIST_KEY_ITSAppUsesNonExemptEncryption: NO
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_NSContactsUsageDescription: plus1 uses your contacts to find friends who are already on the app.
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        INFOPLIST_KEY_UISupportedInterfaceOrientations: UIInterfaceOrientationPortrait
        TARGETED_DEVICE_FAMILY: "1"
        SWIFT_VERSION: "5.9"
        # Analytics keys flow xcconfig -> Info.plist -> Config.swift. Empty
        # defaults (in Config/Analytics.xcconfig) mean "no key, no SDK init".
        INFOPLIST_KEY_POSTHOG_API_KEY: $(POSTHOG_API_KEY)
        INFOPLIST_KEY_POSTHOG_HOST: $(POSTHOG_HOST)
        INFOPLIST_KEY_SENTRY_DSN: $(SENTRY_DSN)
  Plus1UITests:
    type: bundle.ui-testing
    platform: iOS
    sources: [Plus1UITests]
    dependencies:
      - target: Plus1
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.allenliao.Plus1UITests
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: PNQXU683AK
        GENERATE_INFOPLIST_FILE: YES
        TEST_TARGET_NAME: Plus1
        SWIFT_VERSION: "5.9"
